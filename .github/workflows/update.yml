name: update

on:
  workflow_dispatch:
  schedule:
    - cron: "32 20 * * *"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: generate
        uses: shogo82148/actions-github-app-token@d75b03a80d0450d087a12b72dff2d987a4ced993 # v1.3.0
      - uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1.41.1
        with:
          perl-version: "5.38"
      - id: update
        name: update
        run: |
          make update
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
        with:
          github-token: ${{ steps.generate.outputs.token }}
          commit-message: bump sqldef v${{ steps.update.outputs.latest-version }}
